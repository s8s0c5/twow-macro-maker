<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Macro Builder – Turtle WoW</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>Macro Builder</h1>
      <p>for SuperCleveRoid &middot; Turtle WoW</p>
    </header>

    <div class="example-float" id="example-float">
      <div class="ex-top"><span class="ex-label">example</span><span class="ex-use" id="ex-use">use this</span></div>
      <div class="ex-desc" id="ex-desc"></div>
      <div class="ex-code" id="ex-code"></div>
    </div>

    <div id="wizard"></div>

    <button class="add-action" id="btn-add">+ and also...</button>

    <div class="macro-output" id="output">
      <code id="output-text"></code>
      <button class="copy-btn" id="btn-copy">copy</button>
    </div>
  </div>

  <script src="conditionals.js"></script>
  <script src="examples.js"></script>
  <script src="app.js"></script>
</body>
</html>
